version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dupe
      POSTGRES_PASSWORD: dupe
      POSTGRES_DB: dupe_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dupe"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://dupe:dupe@db:5432/dupe_platform
      APP_ENV: development
      DEBUG: "true"
      LOAD_SYNTHETIC_DATA: "true"
      PAYMENT_PLAN_AUTO_ACTIVATE: "false"
      # [BLOCKED: A-WA] Real credentials needed
      WHATSAPP_ACCESS_TOKEN: SYNTHETIC_TOKEN
      WHATSAPP_PHONE_NUMBER_ID: SYNTHETIC_PHONE_ID
      # [BLOCKED: A-EMAIL] Real credentials needed
      SENDGRID_API_KEY: SYNTHETIC_SENDGRID_KEY
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src   # hot-reload in dev
    command: uvicorn dupe_platform.adapters.inbound.api.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "5173:5173"
    environment:
      BACKEND_URL: "http://backend:8000"   # Vite proxy target inside Docker network
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src   # hot-reload in dev

volumes:
  postgres_data:
