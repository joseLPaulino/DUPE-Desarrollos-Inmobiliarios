services:

  # ── PostgreSQL + pgvector ───────────────────────────────────────────────────
  # pgvector/pgvector:pg16 = stock Postgres 16 with the pgvector extension
  # pre-installed. Enables vector similarity search for future agent memory /
  # document embedding features without any additional setup.
  db:
    image: pgvector/pgvector:pg16
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db/init:/docker-entrypoint-initdb.d   # SQL init scripts (optional)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dupe} -d ${POSTGRES_DB:-dupe_platform}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src                     # hot-reload in dev
    command: >
      uv run uvicorn dupe_platform.adapters.inbound.api.main:app
      --host 0.0.0.0 --port 8000 --reload

  # ── React Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "5173:5173"
    environment:
      BACKEND_URL: "http://backend:8000"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src            # hot-reload in dev

volumes:
  postgres_data:
