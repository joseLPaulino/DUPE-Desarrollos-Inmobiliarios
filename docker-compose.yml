version: "3.9"

# All connection strings and secrets live in .env (see .env.example).
# Copy .env.example → .env before running: cp .env.example .env

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    env_file: .env                         # reads POSTGRES_USER / PASSWORD / DB from .env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dupe}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env                         # all Settings fields loaded from .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src                     # hot-reload in dev
    command: uvicorn dupe_platform.adapters.inbound.api.main:app --host 0.0.0.0 --port 8000 --reload

  # ── React Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "5173:5173"
    environment:
      BACKEND_URL: "http://backend:8000"   # Vite proxy target inside Docker network
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src            # hot-reload in dev

volumes:
  postgres_data:
